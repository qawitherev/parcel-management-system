name: CI - Staging

# Trigger: Every push to the staging branch
on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Full CI Gate (Reusing la-developed logic)
  # ─────────────────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci-develop.yml

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build and Push Docker Images to GHCR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/src
          file: ./backend/src/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Staging Server
  # ─────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via Docker Compose
        run: |
          # Use an env file or secret to pass the SHA for the images
          echo "IMAGE_TAG=staging-${{ github.sha }}" > .env
          docker compose pull
          docker compose up -d
        
      - name: Health Check
        run: |
          echo "Waiting for services to stabilize..."
          for i in {1..10}; do
            if curl -f http://localhost:5163/health; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          echo "Health check failed after 10 attempts"
          docker compose down
          exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Smoke Tests
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify Backend Health
        run: curl -f http://staging-api.parcel-system.com/health

      - name: Verify Backend Login Endpoint
        run: |
          curl -f -X POST http://staging-api.parcel-system.com/api/v1/User/login \
          -H "Content-Type: application/json" \
          -d '{"username":"admin", "password":"password"}'
          
      - name: Verify Frontend Accessibility
        run: curl -f http://staging.parcel-system.com
