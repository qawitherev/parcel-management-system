name: CI - Develop

# Tiered strategy:
#   PR → develop:    full gate (lint + build + unit + integration + docker)
#   Push → develop:   fast gate (lint + build + unit only)
#   workflow_dispatch: full gate

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Static Analysis (fast fail ~30s)
  # ─────────────────────────────────────────────────────────────
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # -- .NET code style --
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Check .NET formatting
        run: dotnet format --verify-no-changes
        working-directory: backend

      # -- Frontend linting --
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npx ng lint
        working-directory: frontend

      # -- CodeQL SAST (free for public repos) --
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript

      - name: Build for CodeQL
        run: dotnet build --no-restore
        working-directory: backend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build
  # ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint-and-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build with warnings as errors
        run: dotnet build --configuration Release --no-restore --warnaserror
        working-directory: backend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build
          path: |
            backend/src/ParcelManagement.Api/bin/Release/net9.0
            backend/src/ParcelManagement.Core/bin/Release/net9.0
            backend/src/ParcelManagement.Infrastructure/bin/Release/net9.0
            backend/src/ParcelManagement.Test/bin/Release/net9.0

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dotnet-build
          path: .

      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=unit-test-results.trx"
        working-directory: backend/src/ParcelManagement.Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: backend/**/*.trx

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Integration Tests (Testcontainers — Docker on ubuntu-latest)
  # ─────────────────────────────────────────────────────────────
  integration-test:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: [build, unit-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dotnet-build
          path: .

      - name: Run integration tests
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=intg-test-results.trx"
        working-directory: backend/src/ParcelManagement.Test.Integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: backend/**/*.trx

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Docker Build (dry-run, no push)
  # ─────────────────────────────────────────────────────────────
  docker-dry-run:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: ./backend/src
          file: ./backend/src/Dockerfile
          push: false
          tags: backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (dry-run)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
